<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>AR Навигатор (Стабильный)</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png.PNG">

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        #splash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #111; color: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 99999; font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            text-align: center; padding: 20px; box-sizing: border-box;
        }
        #start-btn {
            background: #4CAF50; color: white; border: none;
            padding: 16px 45px; font-size: 18px; font-weight: bold;
            border-radius: 12px; cursor: pointer; margin-top: 25px;
        }
        #search-overlay {
            position: absolute;
            top: 15px; left: 50%;
            transform: translateX(-50%);
            width: 90%; max-width: 450px;
            z-index: 9999;
            font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            display: none;
        }
        .search-container {
            display: flex;
            background: rgba(255, 255, 255, 0.95);
            padding: 5px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #search-input {
            flex-grow: 1;
            border: none;
            background: transparent;
            padding: 10px 15px;
            font-size: 16px;
            outline: none;
        }
        #search-btn {
            background: #2196F3; color: white; border: none;
            padding: 10px 20px; border-radius: 20px;
            font-weight: bold; cursor: pointer;
        }
        #status-bar {
            background: rgba(0, 0, 0, 0.7); color: white;
            padding: 8px 12px; border-radius: 15px;
            font-size: 12px; text-align: center; margin-top: 10px;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="splash">
        <h2>AR Навигатор</h2>
        <p>Нажмите кнопку для запуска камеры</p>
        <button id="start-btn" onclick="startARSystem()">Запустить AR</button>
    </div>

    <div id="search-overlay">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Что ищем? (кафе, магазин, аптека)">
            <button id="search-btn" onclick="searchPlaces()">Найти</button>
        </div>
        <div id="status-bar">Система готова. Введите запрос!</div>
    </div>

    <a-scene embedded 
             arjs="sourceType: webcam; debugUIEnabled: false;" 
             vr-mode-ui="enabled: false">
        
        <a-entity id="ar-container"></a-entity>
        
        <a-camera id="camera" position="0 0 0"></a-camera>
    </a-scene>

    <script>
        function startARSystem() {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('search-overlay').style.display = 'block';
        }

        function searchPlaces() {
            const query = document.getElementById('search-input').value.trim().toLowerCase();
            const statusBar = document.getElementById('status-bar');
            const container = document.getElementById('ar-container');
            
            if (!query) return alert("Введите запрос!");

            statusBar.innerText = `Отображаем "${query}"...`;
            container.innerHTML = ''; // Очищаем старые объекты

            // Список названий в зависимости от того, что ввел пользователь
            const names = {
                "кафе": ["Уютное Кафе (20м)", "Пиццерия (45м)"],
                "магазин": ["Супермаркет (15м)", "Магазин Продукты (30м)"],
                "аптека": ["Аптека №1 (50м)", "Дежурная Аптека (80м)"]
            };

            const selectedList = names[query] || ["Интересное место (10м)", "Точка Б (25м)"];

            // Генерируем 3D-объекты строго ПЕРЕД камерой
            selectedList.forEach((name, index) => {
                // Рассчитываем позиции так, чтобы объекты стояли веером перед лицом пользователя:
                // Первый объект чуть левее, второй чуть правее
                const angle = (index - (selectedList.length - 1) / 2) * 0.5; // Смещение по бокам
                const distance = -5; // Ставим объекты в 5 метрах прямо перед лицом (в A-Frame минус по оси Z — это "вперед")
                
                const posX = Math.sin(angle) * distance;
                const posZ = Math.cos(angle) * distance;

                // Создаем контейнер для каждого места
                const entity = document.createElement('a-entity');
                entity.setAttribute('position', `${posX} -0.5 ${posZ}`);

                // 1. Создаем яркий красный 3D-цилиндр
                const cylinder = document.createElement('a-cylinder');
                cylinder.setAttribute('color', '#ff3d00');
                cylinder.setAttribute('height', '3');
                cylinder.setAttribute('radius', '0.2');
                cylinder.setAttribute('position', '0 1.5 0');
                entity.appendChild(cylinder);

                // 2. Оранжевый шар на верхушке
                const sphere = document.createElement('a-sphere');
                sphere.setAttribute('color', '#ff9800');
                sphere.setAttribute('radius', '0.4');
                sphere.setAttribute('position', '0 3 0');
                entity.appendChild(sphere);

                // 3. Текст-подпись
                const text = document.createElement('a-text');
                text.setAttribute('value', name);
                text.setAttribute('scale', '4 4 4');
                text.setAttribute('align', 'center');
                text.setAttribute('color', '#ffffff');
                text.setAttribute('position', '0 3.6 0');
                // Заставляем текст всегда разворачиваться к пользователю лицам
                text.setAttribute('look-at', '[camera]');
                entity.appendChild(text);

                container.appendChild(entity);
            });

            statusBar.innerText = `Отображено объектов: ${selectedList.length}. Они прямо перед вами!`;
        }
    </script>
</body>
</html>
