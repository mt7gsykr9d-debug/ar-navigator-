<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Навигатор</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #111;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            font-family: Arial, sans-serif;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        #start-btn {
            background: #ff5722;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(255,87,34,0.4);
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="start-screen">
        <h2>Добро пожаловать в AR-Навигатор!</h2>
        <p>Для работы дополненной реальности приложению необходим доступ к камере, GPS и компасу телефона.</p>
        <button id="start-btn" onclick="startApp()">Запустить AR</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-entity id="ar-elements-container"></a-entity>
        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
        const YANDEX_API_KEY = 'bb7bc2df-a589-41c0-9f73-7b3188dbb428';
        let userLatitude = null;
        let userLongitude = null;

        function startApp() {
            // Запрос прав на компас/гироскоп для iOS
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            initGPS();
                        } else {
                            alert('Без доступа к компасу точки не смогут отображаться на камере!');
                        }
                    })
                    .catch(err => {
                        alert('Ошибка запроса датчиков: ' + err);
                    });
            } else {
                initGPS();
            }
        }

        function initGPS() {
            // Скрываем стартовый экран
            document.getElementById('start-screen').style.display = 'none';

            navigator.geolocation.watchPosition(
                (position) => {
                    userLatitude = position.coords.latitude;
                    userLongitude = position.coords.longitude;
                    
                    // Сразу ставим демонстрационную точку в 10 метрах от тебя
                    showDemoPlace();
                },
                (err) => {
                    alert('Ошибка GPS: ' + err.message + '. Пожалуйста, включите геолокацию на телефоне.');
                },
                { enableHighAccuracy: true }
            );
        }

        function showDemoPlace() {
            const container = document.getElementById('ar-elements-container');
            if (container.children.length > 0) return;

            const arText = document.createElement('a-text');
            arText.setAttribute('value', 'АР-РАБОТАЕТ!\nТестовая точка');
            arText.setAttribute('scale', '15 15 15');
            arText.setAttribute('look-at', '[camera]');
            arText.setAttribute('align', 'center');
            arText.setAttribute('color', '#ff9800');
            arText.setAttribute('gps-entity-place', `latitude: ${userLatitude + 0.0001}; longitude: ${userLongitude + 0.0001};`);
            container.appendChild(arText);
        }
    </script>
</body>
</html>
