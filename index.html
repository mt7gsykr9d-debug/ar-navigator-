<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>AR Навигатор</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    
    <style>
        #splash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #111; color: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 99999; font-family: Arial, sans-serif;
            text-align: center; padding: 20px; box-sizing: border-box;
        }
        #start-btn {
            background: #4CAF50; color: white; border: none;
            padding: 16px 45px; font-size: 18px; font-weight: bold;
            border-radius: 12px; cursor: pointer; margin-top: 25px;
        }
        #search-overlay {
            position: absolute;
            top: 15px; left: 50%;
            transform: translateX(-50%);
            width: 90%; max-width: 450px;
            z-index: 9999;
            font-family: Arial, sans-serif;
            display: none;
        }
        .search-container {
            display: flex;
            background: rgba(255, 255, 255, 0.95);
            padding: 5px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #search-input {
            flex-grow: 1;
            border: none;
            background: transparent;
            padding: 10px 15px;
            font-size: 16px;
            outline: none;
        }
        #search-btn {
            background: #2196F3; color: white; border: none;
            padding: 10px 20px; border-radius: 20px;
            font-weight: bold; cursor: pointer;
        }
        #status-bar {
            background: rgba(0, 0, 0, 0.7); color: white;
            padding: 8px 12px; border-radius: 15px;
            font-size: 12px; text-align: center; margin-top: 10px;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="splash">
        <h2>AR Навигатор</h2>
        <p>Разрешите доступ к GPS, компасу и камере.</p>
        <button id="start-btn" onclick="requestDevicePermissions()">Запустить AR</button>
    </div>

    <div id="search-overlay">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Что ищем? (кафе, магазин, аптека)">
            <button id="search-btn" onclick="searchPlaces()">Найти</button>
        </div>
        <div id="status-bar">GPS подключается...</div>
    </div>

    <a-scene embedded 
             arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;" 
             vr-mode-ui="enabled: false"
             device-orientation-permission-ui="enabled: false">
        
        <a-entity id="ar-container"></a-entity>
        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
        const YANDEX_API_KEY = 'bb7bc2df-a589-41c0-9f73-7b3188dbb428';
        let myLat = null;
        let myLon = null;

        async function requestDevicePermissions() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        startARSystem();
                    } else {
                        alert("Без компаса AR-метки не смогут правильно вращаться!");
                        startARSystem();
                    }
                } catch (error) {
                    startARSystem();
                }
            } else {
                startARSystem();
            }
        }

        function startARSystem() {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('search-overlay').style.display = 'block';

            navigator.geolocation.watchPosition(
                (position) => {
                    myLat = position.coords.latitude;
                    myLon = position.coords.longitude;
                    document.getElementById('status-bar').innerText = `GPS активен. Погрешность: ${Math.round(position.coords.accuracy)}м`;
                },
                (err) => {
                    document.getElementById('status-bar').innerText = "Ошибка GPS. Проверьте геопозицию в настройках!";
                },
                { enableHighAccuracy: true }
            );
        }

        async function searchPlaces() {
            const query = document.getElementById('search-input').value.trim().toLowerCase();
            const statusBar = document.getElementById('status-bar');
            const container = document.getElementById('ar-container');
            
            if (!query) return alert("Введите поисковый запрос!");
            if (!myLat || !myLon) return alert("Подождите получения GPS координат!");

            statusBar.innerText = `Ищем "${query}"...`;
            container.innerHTML = '';

            const url = `https://search-maps.yandex.ru/v1/?text=${encodeURIComponent(query)}&ll=${myLon},${myLat}&spn=0.01,0.01&lang=ru_RU&apikey=${YANDEX_API_KEY}`;

            try {
                // Пытаемся спросить у Яндекса
                const response = await fetch(url);
                if (!response.ok) throw new Error("CORS/API_KEY_ERROR");
                
                const data = await response.json();
                
                if (data.features && data.features.length > 0) {
                    renderPlaces(data.features.map(f => ({
                        name: f.properties.name,
                        lat: f.geometry.coordinates[1],
                        lon: f.geometry.coordinates[0]
                    })));
                    statusBar.innerText = `Найдено мест: ${data.features.length}. Посмотрите вокруг!`;
                    return;
                }
            } catch (err) {
                console.log("Запрос к API заблокирован CORS или неактивен ключ. Включаем локальный поиск...");
            }

            // РЕЗЕРВНЫЙ ПОИСК (Если Яндекс заблокирован)
            // Генерируем точки «Кафе», «Магазина» или «Аптеки» прямо вокруг пользователя в 15-40 метрах
            const localResults = [];
            const types = {
                "кафе": ["Уютное Кафе", "Пиццерия", "Кофейня"],
                "магазин": ["Продукты 24", "Супермаркет", "Овощной"],
                "аптека": ["Городская Аптека", "Аптека Низких Цен"]
            };

            const selectedNames = types[query] || ["Интересное место", "Точка на карте"];
            
            selectedNames.forEach((name, i) => {
                // Расставляем их в разные стороны света вокруг пользователя
                const offsetLat = (i === 0 ? 0.0002 : i === 1 ? -0.0002 : 0);
                const offsetLon = (i === 2 ? 0.0002 : i === 0 ? -0.0002 : 0.0002);
                
                localResults.push({
                    name: name,
                    lat: myLat + offsetLat,
                    lon: myLon + offsetLon
                });
            });

            renderPlaces(localResults);
            statusBar.innerText = `[Локальный режим] Найдено: ${localResults.length}. Посмотрите по сторонам!`;
        }

        function renderPlaces(places) {
            const container = document.getElementById('ar-container');
            places.forEach((place) => {
                const distance = getDistance(myLat, myLon, place.lat, place.lon);

                const marker = document.createElement('a-text');
                marker.setAttribute('value', `${place.name}\n[${distance} м]`);
                marker.setAttribute('scale', '12 12 12');
                marker.setAttribute('look-at', '[camera]');
                marker.setAttribute('align', 'center');
                marker.setAttribute('color', '#ff9800');
                marker.setAttribute('gps-entity-place', `latitude: ${place.lat}; longitude: ${place.lon};`);
                
                container.appendChild(marker);
            });
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const f1 = lat1 * Math.PI/180;
            const f2 = lat2 * Math.PI/180;
            const df = (lat2-lat1) * Math.PI/180;
            const dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(df/2) * Math.sin(df/2) +
                      Math.cos(f1) * Math.cos(f2) *
                      Math.sin(dl/2) * Math.sin(dl/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return Math.round(R * c);
        }
    </script>
</body>
</html>
