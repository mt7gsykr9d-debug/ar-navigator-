<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Навигатор</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
        #ui-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 15px;
            border-radius: 15px;
            font-family: Arial, sans-serif;
            z-index: 9999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-height: 50vh;
            overflow-y: auto;
        }
        #search-box {
            display: flex;
            margin-bottom: 10px;
        }
        #search-input {
            flex-grow: 1;
            padding: 8px;
            border: none;
            border-radius: 5px 0 0 5px;
            outline: none;
        }
        #search-btn {
            background: #ff5722;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 0 5px 5px 0;
            cursor: pointer;
        }
        .info-card {
            border-top: 1px solid #444;
            padding-top: 10px;
            margin-top: 10px;
        }
        .rating {
            color: #ffb300;
            font-weight: bold;
        }
        #status {
            font-size: 12px;
            color: #aaa;
            text-align: center;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="ui-container">
        <div id="search-box">
            <input type="text" id="search-input" placeholder="Введите: магазин, кафе, аптека...">
            <button id="search-btn" onclick="searchRealPlaces()">Найти</button>
        </div>
        <div id="info-area">
            <div id="status">Определение вашего GPS положения...</div>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-entity id="ar-elements-container"></a-entity>
        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
        const YANDEX_API_KEY = 'YOUR_YANDEX_API_KEY'; 

        let userLatitude = null;
        let userLongitude = null;

        navigator.geolocation.watchPosition(
            (position) => {
                userLatitude = position.coords.latitude;
                userLongitude = position.coords.longitude;
                document.getElementById('status').innerText = `Координаты определены. Начните поиск!`;
            },
            (err) => {
                document.getElementById('status').innerText = `Ошибка GPS: ${err.message}. Проверьте доступ к геопозиции.`;
            },
            { enableHighAccuracy: true }
        );

        async function searchRealPlaces() {
            const query = document.getElementById('search-input').value.trim();
            const container = document.getElementById('ar-elements-container');
            const infoArea = document.getElementById('info-area');
            
            container.innerHTML = '';
            infoArea.innerHTML = '';

            if (!userLatitude || !userLongitude) {
                alert("GPS всё еще настраивается. Подождите несколько секунд...");
                return;
            }

            if (!query) {
                alert("Пожалуйста, введите поисковый запрос.");
                return;
            }

            document.getElementById('status').innerText = `Ищем "${query}" поблизости...`;

            if (YANDEX_API_KEY === 'YOUR_YANDEX_API_KEY') {
                document.getElementById('status').innerText = `Для реального поиска нужно вставить API-ключ в код!`;
                showDemoPlaces();
                return;
            }

            const url = `https://search-maps.yandex.ru/v1/?text=${encodeURIComponent(query)}&ll=${userLongitude},${userLatitude}&spn=0.01,0.01&lang=ru_RU&apikey=${YANDEX_API_KEY}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (!data.features || data.features.length === 0) {
                    infoArea.innerHTML = '<div id="status">Ничего не найдено в этом районе.</div>';
                    return;
                }

                document.getElementById('status').innerText = `Найдено мест: ${data.features.length}`;

                data.features.forEach((feature) => {
                    const name = feature.properties.name;
                    const address = feature.properties.CompanyMetaData.address;
                    const lon = feature.geometry.coordinates[0];
                    const lat = feature.geometry.coordinates[1];
                    const rating = "★ 4.5";

                    const arText = document.createElement('a-text');
                    arText.setAttribute('value', `${name}\n${rating}`);
                    arText.setAttribute('scale', '4 4 4');
                    arText.setAttribute('look-at', '[camera]');
                    arText.setAttribute('align', 'center');
                    arText.setAttribute('color', '#00ffcc');
                    arText.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon};`);
                    container.appendChild(arText);

                    const card = document.createElement('div');
                    card.className = 'info-card';
                    card.innerHTML = `
                        <strong>${name}</strong> <span class="rating">${rating}</span><br>
                        <small style="color:#aaa;">Адрес: ${address}</small><br>
                        <button onclick="buildRoute(${lat}, ${lon})" style="margin-top:5px; background:#4CAF50; color:white; border:none; padding:5px 10px; border-radius:3px; cursor:pointer; width:100%;">
                            Дойти пешком
                        </button>
                    `;
                    infoArea.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                document.getElementById('status').innerText = `Ошибка сети при запросе к картам.`;
            }
        }

        function showDemoPlaces() {
            const container = document.getElementById('ar-elements-container');
            const infoArea = document.getElementById('info-area');
            
            const demoPlaces = [
                { name: "ТЦ Меруерт", lat: userLatitude + 0.0004, lon: userLongitude + 0.0004, rating: "★ 4.0", address: "ул. Жанкожа Батыр д. 43" },
                { name: "Mechta.kz", lat: userLatitude - 0.0004, lon: userLongitude - 0.0004, rating: "★ 4.7", address: "ул. Жанкожа Батыр" }
            ];

            demoPlaces.forEach(place => {
                const arText = document.createElement('a-text');
                arText.setAttribute('value', `${place.name}\n${place.rating}`);
                arText.setAttribute('scale', '4 4 4');
                arText.setAttribute('look-at', '[camera]');
                arText.setAttribute('align', 'center');
                arText.setAttribute('color', '#ff9800');
                arText.setAttribute('gps-entity-place', `latitude: ${place.lat}; longitude: ${place.lon};`);
                container.appendChild(arText);

                const card = document.createElement('div');
                card.className = 'info-card';
                card.innerHTML = `
                    <strong>${place.name}</strong> <span class="rating">${place.rating}</span><br>
                    <small style="color:#aaa;">Адрес: ${place.address}</small><br>
                    <button onclick="buildRoute(${place.lat}, ${place.lon})" style="margin-top:5px; background:#2196F3; color:white; border:none; padding:5px 10px; border-radius:3px; cursor:pointer; width:100%;">
                        Дойти пешком (Демо)
                    </button>
                `;
                infoArea.appendChild(card);
            });
        }

        function buildRoute(destLat, destLon) {
            const url = `https://www.google.com/maps/dir/?api=1&origin=${userLatitude},${userLongitude}&destination=${destLat},${destLon}&travelmode=walking`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
