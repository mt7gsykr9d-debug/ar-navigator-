<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>AR Навигатор с Поиском</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    
    <style>
        /* Стартовый экран */
        #splash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #111; color: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 99999; font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            text-align: center; padding: 20px; box-sizing: border-box;
        }
        #start-btn {
            background: #4CAF50; color: white; border: none;
            padding: 16px 45px; font-size: 18px; font-weight: bold;
            border-radius: 12px; cursor: pointer; margin-top: 25px;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
        }

        /* Оверлей поиска поверх камеры */
        #search-overlay {
            position: absolute;
            top: 15px; left: 50%;
            transform: translateX(-50%);
            width: 90%; max-width: 450px;
            z-index: 9999;
            font-family: Arial, sans-serif;
            display: none; /* Покажется только после старта */
        }
        .search-container {
            display: flex;
            background: rgba(255, 255, 255, 0.95);
            padding: 5px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #search-input {
            flex-grow: 1;
            border: none;
            background: transparent;
            padding: 10px 15px;
            font-size: 16px;
            outline: none;
        }
        #search-btn {
            background: #2196F3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        #status-bar {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 12px;
            border-radius: 15px;
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="splash">
        <h2>AR Навигатор</h2>
        <p style="color: #ddd;">Разрешите доступ к GPS, компасу и камере для работы приложения.</p>
        <button id="start-btn" onclick="requestDevicePermissions()">Запустить AR</button>
    </div>

    <div id="search-overlay">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Куда хотите пойти? (например, кафе)...">
            <button id="search-btn" onclick="searchPlaces()">Найти</button>
        </div>
        <div id="status-bar">GPS подключается...</div>
    </div>

    <a-scene embedded 
             arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;" 
             vr-mode-ui="enabled: false"
             device-orientation-permission-ui="enabled: false">
        
        <a-entity id="ar-container"></a-entity>
        
        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
        // Твой рабочий API-ключ Яндекса
        const YANDEX_API_KEY = 'bb7bc2df-a589-41c0-9f73-7b3188dbb428';
        let myLat = null;
        let myLon = null;

        async function requestDevicePermissions() {
            // Запрос компаса на iOS
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        startARSystem();
                    } else {
                        alert("Доступ к компасу отклонен. Метки не смогут правильно вращаться.");
                    }
                } catch (error) {
                    alert("Ошибка датчиков компаса: " + error);
                }
            } else {
                startARSystem();
            }
        }

        function startARSystem() {
            // Скрываем заставку и показываем поиск
            document.getElementById('splash').style.display = 'none';
            document.getElementById('search-overlay').style.display = 'block';

            // Следим за GPS
            navigator.geolocation.watchPosition(
                (position) => {
                    myLat = position.coords.latitude;
                    myLon = position.coords.longitude;
                    document.getElementById('status-bar').innerText = `GPS активен. Погрешность: ${Math.round(position.coords.accuracy)}м`;
                },
                (err) => {
                    document.getElementById('status-bar').innerText = "Ошибка GPS: " + err.message;
                },
                { enableHighAccuracy: true }
            );
        }

        // Поиск мест через API Яндекс Геокодера / Организаций
        async function searchPlaces() {
            const query = document.getElementById('search-input').value.trim();
            const statusBar = document.getElementById('status-bar');
            
            if (!query) return alert("Введите запрос для поиска!");
            if (!myLat || !myLon) return alert("Подождите, пока телефон поймает GPS-координаты!");

            statusBar.innerText = `Ищем "${query}" поблизости...`;

            // Ссылка на API Яндекса для поиска мест вокруг координат пользователя
            const url = `https://search-maps.yandex.ru/v1/?text=${encodeURIComponent(query)}&ll=${myLon},${myLat}&spn=0.02,0.02&lang=ru_RU&apikey=${YANDEX_API_KEY}`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                // Очищаем старые маркеры с камеры
                const container = document.getElementById('ar-container');
                container.innerHTML = '';

                if (!data.features || data.features.length === 0) {
                    statusBar.innerText = "Ничего не найдено рядом.";
                    return;
                }

                // Перебираем найденные места и добавляем их на экран
                data.features.forEach((feature, index) => {
                    const coords = feature.geometry.coordinates;
                    const lon = coords[0];
                    const lat = coords[1];
                    const name = feature.properties.name;
                    
                    // Вычисляем расстояние до места в метрах
                    const distance = getDistance(myLat, myLon, lat, lon);

                    // Создаем 3D-текст на камере
                    const marker = document.createElement('a-text');
                    marker.setAttribute('value', `${name}\n[${distance} м]`);
                    marker.setAttribute('scale', '15 15 15');
                    marker.setAttribute('look-at', '[camera]');
                    marker.setAttribute('align', 'center');
                    marker.setAttribute('color', index === 0 ? '#ff5722' : '#00bcd4'); // Ближайший сделаем оранжевым
                    marker.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon};`);
                    
                    container.appendChild(marker);
                });

                statusBar.innerText = `Найдено мест: ${data.features.length}. Поверните телефон по сторонам!`;

            } catch (err) {
                statusBar.innerText = "Ошибка поиска!";
                console.error(err);
            }
        }

        // Вспомогательная функция расчета расстояния между координатами
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // радиус Земли в метрах
            const f1 = lat1 * Math.PI/180;
            const f2 = lat2 * Math.PI/180;
            const df = (lat2-lat1) * Math.PI/180;
            const dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(df/2) * Math.sin(df/2) +
                      Math.cos(f1) * Math.cos(f2) *
                      Math.sin(dl/2) * Math.sin(dl/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return Math.round(R * c);
        }
    </script>
</body>
</html>
